# Store-and-forward basic delivery tests (Tier 2)
# A sends to offline B via server S; B comes online, receives via ForwardDeliver

scenarios:
  - scenario: forward-basic-rust-ts
    description: Rust sends to offline TypeScript via Rust server, delivered on reconnect
    tier: 2
    category: forward
    participants:
      - { role: sender, lang: rust }
      - { role: server, lang: rust }
      - { role: recipient, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: sender, params: { mechanism: psk, flow: initiation, psk: "test-fwd-sender-psk" } }
      - { type: pair, actor: server, params: { mechanism: psk, flow: initiation, psk: "test-fwd-sender-psk" } }
      - { type: pair, actor: recipient, params: { mechanism: psk, flow: initiation, psk: "test-fwd-recip-psk" } }
      - { type: pair, actor: server, params: { mechanism: psk, flow: initiation, psk: "test-fwd-recip-psk" } }
      - { type: disconnect, actor: recipient, params: {} }
      - type: send_forward
        actor: sender
        params:
          destination: recipient
          via: server
          payload_hex: "666f72776172646564206d657373616765"
      - { type: wait, params: { duration_ms: 1000 } }
      - { type: reconnect, actor: recipient, params: {} }
    expected:
      - { type: message_received, actor: recipient, params: { payload_hex: "666f72776172646564206d657373616765" } }
      - { type: status, actor: server, params: { forward_delivered: true } }
    timeout_ms: 30000
    budget_ms: 30000

