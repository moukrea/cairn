  - scenario: mesh-2hop-e2e-encryption
    description: Relay node cannot decrypt relayed data (E2E encryption verification)
    tier: 0
    category: mesh
    participants:
      - { role: peer_a, lang: rust }
      - { role: relay_b, lang: go }
      - { role: peer_c, lang: ts }
    network:
      topology:
        peer_a_to_relay_b: { reachable: true }
        relay_b_to_peer_c: { reachable: true }
        peer_a_to_peer_c: { reachable: false }
    actions:
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-mesh-e2e-ab-psk" } }
      - { type: pair, actor: relay_b, params: { mechanism: psk, flow: initiation, psk: "test-mesh-e2e-ab-psk" } }
      - { type: pair, actor: relay_b, params: { mechanism: psk, flow: initiation, psk: "test-mesh-e2e-bc-psk" } }
      - { type: pair, actor: peer_c, params: { mechanism: psk, flow: initiation, psk: "test-mesh-e2e-bc-psk" } }
      - { type: send_data, actor: peer_a, params: { destination: peer_c, channel: mesh-test, payload_hex: "7365637265742064617461" } }
    expected:
      - { type: message_received, actor: peer_c, params: { channel: mesh-test, payload_hex: "7365637265742064617461" } }
      - { type: route_found, params: { hops: 2, path: [peer_a, relay_b, peer_c] } }
      - { type: status, actor: relay_b, params: { saw_only_opaque_ciphertext: true, decrypt_attempt_fails: true } }
    timeout_ms: 20000
    budget_ms: 20000

  - scenario: mesh-2hop-no-route
    description: Routing fails when relay is not paired with destination
    tier: 0
    category: mesh
    participants:
      - { role: peer_a, lang: rust }
      - { role: relay_b, lang: ts }
      - { role: peer_c, lang: go }
    network:
