# Mesh 2-hop routing tests — A->B->C with E2E encryption
# A cannot reach C directly; B relays with opaque ciphertext

scenarios:
  - scenario: mesh-2hop-rust-ts-go
    description: "Rust(A)->TypeScript(B)->Go(C): data routed, E2E encryption intact"
    tier: 0
    category: mesh
    participants:
      - { role: peer_a, lang: rust }
      - { role: relay_b, lang: ts }
      - { role: peer_c, lang: go }
    network:
      topology:
        peer_a_to_relay_b: { reachable: true }
        relay_b_to_peer_c: { reachable: true }
        peer_a_to_peer_c: { reachable: false }
    actions:
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-mesh-ab-psk" } }
      - { type: pair, actor: relay_b, params: { mechanism: psk, flow: initiation, psk: "test-mesh-ab-psk" } }
      - { type: pair, actor: relay_b, params: { mechanism: psk, flow: initiation, psk: "test-mesh-bc-psk" } }
      - { type: pair, actor: peer_c, params: { mechanism: psk, flow: initiation, psk: "test-mesh-bc-psk" } }
      - { type: send_data, actor: peer_a, params: { destination: peer_c, channel: mesh-test, payload_hex: "6d65736820726f7574696e67" } }
    expected:
      - { type: message_received, actor: peer_c, params: { channel: mesh-test, payload_hex: "6d65736820726f7574696e67" } }
      - { type: route_found, params: { hops: 2, path: [peer_a, relay_b, peer_c] } }
      - { type: status, actor: relay_b, params: { saw_only_opaque_ciphertext: true } }
    timeout_ms: 20000
    budget_ms: 20000

