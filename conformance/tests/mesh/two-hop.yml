        peer_a_to_relay_b: { reachable: true }
        relay_b_to_peer_c: { reachable: true }
        peer_a_to_peer_c: { reachable: false }
    actions:
      # Only pair A<->B, NOT B<->C
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-mesh-noroute-ab-psk" } }
      - { type: pair, actor: relay_b, params: { mechanism: psk, flow: initiation, psk: "test-mesh-noroute-ab-psk" } }
      - { type: send_data, actor: peer_a, params: { destination: peer_c, channel: mesh-test, payload_hex: "756e726561636861626c65" } }
    expected:
      - { type: error, actor: peer_a, params: { error_type: no_route, description: "No route found to peer_c" } }
    timeout_ms: 20000
    budget_ms: 20000
