  # DataNack retransmission under packet loss
  - scenario: data-nack-retransmit
    description: DataNack triggers retransmission, eventual delivery confirmed
    tier: 0
    category: data
    participants:
      - { role: sender, lang: any }
      - { role: receiver, lang: any }
    network:
      nat_profile: open
      netem:
        loss_pct: 30
    actions:
      - { type: pair, actor: sender, params: { mechanism: psk, flow: initiation, psk: "test-nack-psk" } }
      - { type: pair, actor: receiver, params: { mechanism: psk, flow: initiation, psk: "test-nack-psk" } }
      - { type: establish_session, actor: sender, params: {} }
      - { type: open_channel, actor: sender, params: { name: reliable-test } }
      - { type: send_data, actor: sender, params: { channel: reliable-test, payload_hex: "7265747261736d69742074657374", reliable: true } }
    expected:
      - { type: message_received, actor: receiver, params: { channel: reliable-test, payload_hex: "7265747261736d69742074657374" } }
    timeout_ms: 15000
    budget_ms: 5000
