# Data transfer interop tests — DataMessage/DataAck/DataNack across language pairs
# Validates: payload integrity, DataAck receipt, DataNack retransmission

scenarios:
  - scenario: data-send-recv-rust-ts
    description: DataMessage send/receive between Rust and TypeScript
    tier: 0
    category: data
    participants:
      - { role: sender, lang: rust }
      - { role: receiver, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: sender, params: { mechanism: psk, flow: initiation, psk: "test-data-psk" } }
      - { type: pair, actor: receiver, params: { mechanism: psk, flow: initiation, psk: "test-data-psk" } }
      - { type: establish_session, actor: sender, params: {} }
      - { type: open_channel, actor: sender, params: { name: test-data } }
      - { type: send_data, actor: sender, params: { channel: test-data, payload_hex: "48656c6c6f20636169726e" } }
    expected:
      - { type: message_received, actor: receiver, params: { channel: test-data, payload_hex: "48656c6c6f20636169726e" } }
      - { type: status, actor: sender, params: { ack_received: true } }
    timeout_ms: 5000
    budget_ms: 5000

