# Session re-establishment tests — after expiry (>24h), full Noise XX re-handshake
# Validates: new session ID, fresh Double Ratchet, no re-pairing required

scenarios:
  - scenario: session-reestablish-basic
    description: Session re-establishment after simulated 24h expiry
    tier: 0
    category: session
    participants:
      - { role: peer_a, lang: any }
      - { role: peer_b, lang: any }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-reest-psk" } }
      - { type: pair, actor: peer_b, params: { mechanism: psk, flow: initiation, psk: "test-reest-psk" } }
      - { type: establish_session, actor: peer_a, params: {} }
      - type: disconnect
        actor: peer_a
        params:
          simulate_expiry: true
          elapsed_hours: 25
      - { type: reconnect, actor: peer_a, params: {} }
    expected:
      - { type: session_state, actor: peer_a, params: { state: Connected, new_session_id: true } }
      - { type: status, params: { handshake: "noise_xx", fresh_ratchet: true, re_pairing: false } }
    timeout_ms: 15000
    budget_ms: 15000

  - scenario: session-reestablish-cross-lang
    description: Session re-establishment between different languages after expiry
    tier: 0
    category: session
    participants:
      - { role: peer_a, lang: rust }
      - { role: peer_b, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-reest-cross-psk" } }
      - { type: pair, actor: peer_b, params: { mechanism: psk, flow: initiation, psk: "test-reest-cross-psk" } }
      - { type: establish_session, actor: peer_a, params: {} }
      - { type: disconnect, actor: peer_a, params: { simulate_expiry: true, elapsed_hours: 25 } }
      - { type: reconnect, actor: peer_a, params: {} }
      - { type: send_data, actor: peer_a, params: { channel: test, payload_hex: "61667465722072656573746162" } }
    expected:
      - { type: session_state, actor: peer_a, params: { state: Connected, new_session_id: true } }
      - { type: message_received, actor: peer_b, params: { channel: test, payload_hex: "61667465722072656573746162" } }
    timeout_ms: 15000
    budget_ms: 15000

