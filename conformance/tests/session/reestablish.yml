      - { type: pair, actor: peer_b, params: { mechanism: psk, flow: initiation, psk: "test-reest-data-psk" } }
      - { type: establish_session, actor: peer_a, params: {} }
      - { type: disconnect, actor: peer_a, params: { simulate_expiry: true, elapsed_hours: 25 } }
      - { type: reconnect, actor: peer_a, params: {} }
      # Send in both directions on the re-established session
      - { type: send_data, actor: peer_a, params: { channel: test, payload_hex: "612d746f2d62" } }
      - { type: send_data, actor: peer_b, params: { channel: test, payload_hex: "622d746f2d61" } }
    expected:
      - { type: session_state, actor: peer_a, params: { state: Connected, new_session_id: true } }
      - { type: message_received, actor: peer_b, params: { channel: test, payload_hex: "612d746f2d62" } }
      - { type: message_received, actor: peer_a, params: { channel: test, payload_hex: "622d746f2d61" } }
      - { type: status, params: { handshake: "noise_xx", fresh_ratchet: true, re_pairing: false } }
    timeout_ms: 15000
    budget_ms: 15000

  - scenario: session-reestablish-asymmetric-expiry
    description: Peer A session expired but peer B session still valid — triggers re-establishment
    tier: 0
    category: session
    participants:
      - { role: peer_a, lang: ts }
      - { role: peer_b, lang: php }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: peer_a, params: { mechanism: psk, flow: initiation, psk: "test-reest-asym-psk" } }
      - { type: pair, actor: peer_b, params: { mechanism: psk, flow: initiation, psk: "test-reest-asym-psk" } }
      - { type: establish_session, actor: peer_a, params: {} }
      # Only peer_a's session expires; peer_b still has valid session (<24h)
      - { type: disconnect, actor: peer_a, params: { simulate_expiry: true, elapsed_hours: 25 } }
      - { type: disconnect, actor: peer_b, params: { simulate_expiry: false, elapsed_hours: 12 } }
      - { type: reconnect, actor: peer_a, params: {} }
      - { type: reconnect, actor: peer_b, params: {} }
    expected:
      # Both peers end up with a fresh session despite asymmetric expiry
      - { type: session_state, actor: peer_a, params: { state: Connected, new_session_id: true } }
      - { type: session_state, actor: peer_b, params: { state: Connected, new_session_id: true } }
      - { type: status, params: { handshake: "noise_xx", fresh_ratchet: true, re_pairing: false } }
    timeout_ms: 15000
    budget_ms: 15000
