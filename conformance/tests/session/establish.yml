# Session establishment interop tests — all 10 language pairs
# Validates: Noise XX handshake completion, UUID v7 session ID, Double Ratchet init

scenarios:
  - scenario: session-establish-rust-ts
    description: Session establishment between Rust and TypeScript
    tier: 0
    category: session
    participants:
      - { role: initiator, lang: rust }
      - { role: responder, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: initiator, params: { mechanism: psk, flow: initiation, psk: "test-session-est-psk" } }
      - { type: pair, actor: responder, params: { mechanism: psk, flow: initiation, psk: "test-session-est-psk" } }
      - { type: establish_session, actor: initiator, params: {} }
    expected:
      - { type: session_state, actor: initiator, params: { state: Connected } }
      - { type: session_state, actor: responder, params: { state: Connected } }
      - { type: status, params: { session_id_format: uuid_v7, ratchet_initialized: true } }
    timeout_ms: 10000
    budget_ms: 10000

