# PSK pairing interop tests — all 10 language pairs
# Mechanism: Pre-shared key (128-bit minimum entropy)
# Flow: Initiation
# Validates: PSK accepted, SPAKE2 completion with PSK-derived credentials

scenarios:
  - scenario: pair-psk-rust-ts
    description: Psk pairing between RUST and TypeScript
    tier: 0
    category: pairing
    participants:
      - { role: initiator, lang: rust }
      - { role: responder, lang: ts }
    network: { nat_profile: open }
    actions:
      - type: pair
        actor: initiator
        params:
          mechanism: psk
          flow: initiation
          psk: "test-conformance-psk-128bit-minimum-entropy"
      - type: pair
        actor: responder
        params:
          mechanism: psk
          flow: initiation
          psk: "test-conformance-psk-128bit-minimum-entropy"
    expected:
      - { type: status, actor: initiator, params: { pairing: complete } }
      - { type: status, actor: responder, params: { pairing: complete } }
      - { type: crypto_match, params: { description: "SPAKE2 shared secret matches with PSK input" } }
    timeout_ms: 30000
    budget_ms: 30000

