# QR code pairing interop tests — all 10 language pairs
# Mechanism: QR code (binary CBOR, EC Level M, max 256 bytes)
# Flow: Initiation
# Validates: CBOR payload roundtrip, SPAKE2 shared secret agreement, mutual trust stored

scenarios:
  - scenario: pair-qr-rust-ts
    description: QR code pairing between Rust and TypeScript
    tier: 0
    category: pairing
    participants:
      - role: initiator
        lang: rust
      - role: responder
        lang: ts
    network:
      nat_profile: open
    actions:
      - type: pair
        actor: initiator
        params:
          mechanism: qr
          flow: initiation
      - type: pair
        actor: responder
        params:
          mechanism: qr
          flow: initiation
          payload_source: initiator
    expected:
      - type: status
        actor: initiator
        params: { pairing: complete }
      - type: status
        actor: responder
        params: { pairing: complete }
      - type: cbor_match
        params: { description: "QR payload valid CBOR, max 256 bytes" }
      - type: crypto_match
        params: { description: "SPAKE2 shared secret matches" }
    timeout_ms: 30000
    budget_ms: 30000

