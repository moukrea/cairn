# Pairing link interop tests — all 10 language pairs
# Mechanism: Pairing link (cairn://pair?pid=...&nonce=...&pake=...&hints=...)
# Flow: Initiation
# Validates: URI parsing with all required parameters, SPAKE2 completion

scenarios:
  - scenario: pair-link-rust-ts
    description: Pairing link exchange between Rust and TypeScript
    tier: 0
    category: pairing
    participants:
      - { role: initiator, lang: rust }
      - { role: responder, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: initiator, params: { mechanism: link, flow: initiation } }
      - { type: pair, actor: responder, params: { mechanism: link, flow: initiation, link_source: initiator } }
    expected:
      - { type: status, actor: initiator, params: { pairing: complete } }
      - { type: status, actor: responder, params: { pairing: complete } }
      - { type: crypto_match, params: { description: "SPAKE2 shared secret matches" } }
    timeout_ms: 30000
    budget_ms: 30000

