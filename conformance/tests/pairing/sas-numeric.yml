# Numeric SAS pairing interop tests — all 10 language pairs
# Mechanism: Numeric SAS (6-digit code from handshake transcript)
# Flow: Standard (verification)
# Validates: 6-digit SAS code matches on both sides, HKDF->4bytes->u32 mod 1000000

scenarios:
  - scenario: pair-sas-numeric-rust-ts
    description: Numeric Sas pairing between RUST and TypeScript
    tier: 0
    category: pairing
    participants:
      - { role: initiator, lang: rust }
      - { role: responder, lang: ts }
    network: { nat_profile: open }
    actions:
      - { type: pair, actor: initiator, params: { mechanism: numeric_sas, flow: standard } }
      - { type: pair, actor: responder, params: { mechanism: numeric_sas, flow: standard } }
    expected:
      - { type: status, actor: initiator, params: { pairing: complete } }
      - { type: status, actor: responder, params: { pairing: complete } }
      - { type: crypto_match, params: { description: "6-digit SAS code matches on both sides" } }
    timeout_ms: 30000
    budget_ms: 30000

